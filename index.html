<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Image Explosion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body{
      font-family: "Instrument Serif", serif;
      background-color: #111111;
      color: #ffffff;
  }

  .section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
  }

  .image-section {
    height: 500vh;
  }

  .image-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .image-stack {
    position: relative;
    width: 50%;
    height: 70vh;
  }

  .image-stack img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    border-radius: 8px;
  }

  .image-text{
    font-size: 64px;
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
  }
</style>
</head>
<body>

<div class="section top">
  <p>Welcome to the code</p>
</div>

<div class="image-section">
  <div class="image-wrapper">
    <div class="image-stack">
      <img src="https://picsum.photos/400/225?random=1">
      <img src="https://picsum.photos/400/225?random=2">
      <img src="https://picsum.photos/400/225?random=3">
      <img src="https://picsum.photos/400/225?random=4">
      <img src="https://picsum.photos/400/225?random=5">
      <img src="https://picsum.photos/400/225?random=1">
      <img src="https://picsum.photos/400/225?random=2">
      <img src="https://picsum.photos/400/225?random=3">
      <img src="https://picsum.photos/400/225?random=4">
      <img src="https://picsum.photos/400/225?random=5">

    </div>
    <div class="image-text">
      <p>Scroll until the end</p>
    </div>
  </div>
</div>

<div class="section bottom">
  <p>Section has been ended</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);

  const images = gsap.utils.toArray(".image-stack img");

  // ✅ Stack order (top → bottom)
  images.forEach((img, i) => {
    img.style.zIndex = images.length - i;
  });

  // ✅ STATIC DIRECTIONS (designed spread)
const directions = [
  { x: -0.8, y: 1  },
  { x: 1,  y: -1 },
  { x: -1, y: -1 },
  { x: 1,  y: 1  },
  { x: -1, y: -0.8 },
  { x: 1,  y: 1  },
  { x: 0.8,  y: -1 },
  { x: -1, y: -1 },
  { x: 1,  y: -1 },
  { x: -1, y: 1  }
];

  // ✅ Initial state
  gsap.set(images, {
    scale: 0,
    x: 0,
    y: 0,
    transformOrigin: "center center",
    willChange: "transform"
  });

  gsap.to(images, {
    scrollTrigger: {
      trigger: ".image-section",
      start: "top top",
      end: "bottom bottom",
      scrub: 1,
      pin: ".image-wrapper",
      anticipatePin: 1,
      invalidateOnRefresh: true,
    },

    scale: 1.2,

    // ✅ Use static directions
      x: (i) => window.innerWidth * directions[i % directions.length].x,
      y: (i) => window.innerHeight * directions[i % directions.length].y,

    // ✅ Staggered reveal
    stagger: {
      each: 0.07,
      },

    ease: "linear"
  });

  // ✅ Handle resize
  window.addEventListener("resize", () => {
    ScrollTrigger.refresh();
  });
</script>

</body>
</html>
